<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/all_layers_1.js"></script>
        <script src="layers/all_layers_2.js"></script>
        <script src="layers/all_layers_3.js"></script>
        <script src="layers/all_layers_4.js"></script>
        <script src="styles/all_styles_1.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        
        
        <script>
        var isGrayActive = false;
        setInterval(function() {
            if (typeof map !== 'undefined') {
                map.getLayers().forEach(function(layer) {
                    if (layer instanceof ol.layer.Tile && !layer.get('grayFilterAdded')) {
                        layer.on('prerender', function(event) { if (isGrayActive && event.context) event.context.filter = 'grayscale(100%)'; });
                        layer.on('postrender', function(event) { if (isGrayActive && event.context) event.context.filter = 'none'; });
                        layer.set('grayFilterAdded', true);
                    }
                });
                var switcherPanel = document.querySelector('.layer-switcher .panel') || document.querySelector('.layer-switcher');
                if (switcherPanel && !document.getElementById('dynGrayscale')) {
                    var toggleDiv = document.createElement('div');
                    toggleDiv.style.padding = '8px 5px';
                    toggleDiv.style.borderTop = '1px solid #ddd';
                    toggleDiv.style.marginTop = '10px';
                    toggleDiv.style.fontWeight = 'bold';
                    var isChecked = isGrayActive ? 'checked' : '';
                    toggleDiv.innerHTML = '<label style="cursor:pointer;"><input type="checkbox" id="dynGrayscale" ' + isChecked + '> Nền Đen - Trắng</label>';
                    switcherPanel.appendChild(toggleDiv);
                    document.getElementById('dynGrayscale').addEventListener('change', function(e) {
                        isGrayActive = e.target.checked;
                        map.render();
                    });
                }
            }
        }, 500); // Lặp lại mỗi 0.5s trọn đời
        </script>

    </body>
</html>
