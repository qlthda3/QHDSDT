<!-- opacity-slider-v8 -->
<style>
/* Khóa cứng kích thước panel để chống lỗi full màn hình */
.layer-switcher.shown, .layer-switcher .panel {
    max-width: 350px !important;
    min-width: 200px;
}
.opacity-slider {
    -webkit-appearance: none; appearance: none;
    height: 3px !important; background: #c6c6c6; border-radius: 2px; outline: none;
}
.opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; border-radius: 50%; background: #555; cursor: pointer;
}
.opacity-slider::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%; background: #555; cursor: pointer; border: none;
}
.opacity-slider-wrap {
    display: block; /* Dùng block thay vì flex để chống bung chiều rộng */
    margin-top: 5px; margin-bottom: 5px; padding-left: 25px;
    width: 100%; box-sizing: border-box;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var mapElement = document.getElementById('map');
    if (!mapElement) return;

    function getLayerByTitle(title, group) {
        if (typeof map === 'undefined') return null;
        var layers = group ? group.getLayers().getArray() : map.getLayers().getArray();
        for (var i = 0; i < layers.length; i++) {
            var layer = layers[i];
            if (layer.get('title') === title) return layer;
            if (layer.getLayers) {
                var found = getLayerByTitle(title, layer);
                if (found) return found;
            }
        }
        return null;
    }

    var layerSwitcher = null;
    var isProcessing = false;
    
    var observer = new MutationObserver(function(mutations) {
        if (isProcessing) return;
        isProcessing = true;
        observer.disconnect(); // Ngắt kết nối để can thiệp DOM
        
        // CHẠY ĐỒNG BỘ: Sửa DOM ngay lập tức để không bị giật và không bị full màn hình
        addOpacitySliders();
        
        if (layerSwitcher) observer.observe(layerSwitcher, { childList: true, subtree: true });
        isProcessing = false;
    });

    setTimeout(function() {
        layerSwitcher = document.querySelector('.layer-switcher');
        if (layerSwitcher) {
            addOpacitySliders();
            observer.observe(layerSwitcher, { childList: true, subtree: true });
        }
    }, 1000);

    function addOpacitySliders() {
        var listItems = document.querySelectorAll('.layer-switcher li');
        for (var i = 0; i < listItems.length; i++) {
            var li = listItems[i];
            if (li.querySelector('.opacity-slider-wrap')) continue;
            
            var checkbox = li.querySelector(':scope > input[type="checkbox"]') || li.querySelector('input[type="checkbox"]');
            var labelElement = li.querySelector(':scope > label') || li.querySelector('label');
            if (!checkbox || !labelElement) continue;
            
            var layerTitle = (labelElement.innerText || labelElement.textContent).trim();
            var targetLayer = getLayerByTitle(layerTitle);
            if (!targetLayer) continue;
            
            var isBaseMap = false;
            if (targetLayer && targetLayer.get('type') === 'base') isBaseMap = true;
            var parentLi = li.parentElement;
            while(parentLi && parentLi.className.indexOf('layer-switcher') === -1) {
                if (parentLi.tagName && parentLi.tagName.toLowerCase() === 'li') {
                    var pLabel = parentLi.querySelector(':scope > label') || parentLi.querySelector('label');
                    if (pLabel) {
                        var pTitle = (pLabel.innerText || pLabel.textContent).toLowerCase().trim();
                        if (pTitle === 'base maps' || pTitle.indexOf('bản đồ nền') > -1 || pTitle === 'basemaps') {
                            isBaseMap = true; break;
                        }
                    }
                }
                parentLi = parentLi.parentElement;
            }
            var tLow = layerTitle.toLowerCase();
            var prefixes = ['google ', 'osm ', 'bing ', 'stamen ', 'carto ', 'esri ', 'mapbox ', 'yandex '];
            for(var p = 0; p < prefixes.length; p++) {
                if (tLow.indexOf(prefixes[p]) === 0) { isBaseMap = true; break; }
            }
            if (isBaseMap) continue;
            
            var currentOpacity = (targetLayer.getOpacity !== undefined) ? targetLayer.getOpacity() : 1;
            
            var sliderContainer = document.createElement('div');
            sliderContainer.className = 'opacity-slider-wrap';
            
            sliderContainer.innerHTML = '<span style="font-size: 11px; color: #555; white-space: nowrap; margin-right: 8px;">Độ trong suốt:</span> <input type="range" class="opacity-slider" min="0" max="1" step="0.1" value="' + currentOpacity + '" style="width: 80px; margin: 0; padding: 0; position: static; display: inline-block; cursor: pointer;">';
            
            var stopEvts = ['click', 'mousedown', 'mouseup', 'touchstart', 'touchend', 'pointerdown', 'pointerup', 'dblclick'];
            stopEvts.forEach(function(evt) {
                sliderContainer.addEventListener(evt, function(e) { e.stopPropagation(); });
            });
            
            var slider = sliderContainer.querySelector('input');
            slider.targetLayerTitle = layerTitle;
            slider.addEventListener('input', function(e) {
                var val = parseFloat(e.target.value);
                var l = getLayerByTitle(e.target.targetLayerTitle);
                if (l && l.setOpacity) l.setOpacity(val);
            });
            
            var childUl = null;
            for (var k = 0; k < li.children.length; k++) {
                if (li.children[k].tagName && li.children[k].tagName.toLowerCase() === 'ul') {
                    childUl = li.children[k];
                    break;
                }
            }
            
            if (childUl) {
                childUl.insertBefore(sliderContainer, childUl.firstChild);
            } else {
                li.appendChild(sliderContainer);
            }
        }
    }
});
</script>

<!-- collapse-legend-v8 -->
<style>
/* Khóa cứng kích thước panel */
.layer-switcher.shown, .layer-switcher .panel {
    max-width: 350px !important;
    min-width: 200px;
}
.legend-toggle {
    cursor: pointer; font-size: 10px; color: #555; margin-left: 8px;
    display: inline-block; vertical-align: middle;
    transition: transform 0.2s ease; user-select: none;
}
.legend-toggle.collapsed { transform: rotate(-90deg); }
.label-collapsed img { display: none !important; }
.label-collapsed br { display: none !important; }
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var layerStates = {};
    var isProcessingCollapse = false;
    
    var observer = new MutationObserver(function(mutations) {
        if (isProcessingCollapse) return;
        isProcessingCollapse = true;
        observer.disconnect(); 
        
        // CHẠY ĐỒNG BỘ
        addCollapseToggles();
        
        var layerSwitcher = document.querySelector('.layer-switcher');
        if (layerSwitcher) observer.observe(layerSwitcher, { childList: true, subtree: true });
        isProcessingCollapse = false;
    });

    setTimeout(function() {
        var layerSwitcher = document.querySelector('.layer-switcher');
        if (layerSwitcher) {
            addCollapseToggles();
            observer.observe(layerSwitcher, { childList: true, subtree: true });
        }
    }, 1000);

    function addCollapseToggles() {
        var labels = document.querySelectorAll('.layer-switcher li label');
        for (var i = 0; i < labels.length; i++) {
            var label = labels[i];
            if (label.querySelector('.legend-toggle')) continue;
            
            var imgs = label.querySelectorAll('img');
            var brs = label.querySelectorAll('br');
            if (imgs.length > 0 && brs.length > 0) {
                var layerTitle = (label.innerText || label.textContent).trim();
                
                var toggleSpan = document.createElement('span');
                toggleSpan.innerHTML = '▼';
                toggleSpan.title = 'Thu gọn / Mở rộng';
                toggleSpan.setAttribute('data-title', layerTitle);
                
                if (layerStates[layerTitle] === undefined) {
                    layerStates[layerTitle] = true; 
                }
                
                if (layerStates[layerTitle] === true) {
                    label.classList.add('label-collapsed');
                    toggleSpan.className = 'legend-toggle collapsed';
                } else {
                    label.classList.remove('label-collapsed');
                    toggleSpan.className = 'legend-toggle';
                }
                
                label.appendChild(toggleSpan);
                
                toggleSpan.addEventListener('click', function(e) {
                    e.preventDefault(); e.stopPropagation();
                    var title = this.getAttribute('data-title');
                    var parentLabel = this.parentElement;
                    
                    layerStates[title] = !layerStates[title]; 
                    
                    if (layerStates[title]) {
                        parentLabel.classList.add('label-collapsed');
                        this.classList.add('collapsed');
                    } else {
                        parentLabel.classList.remove('label-collapsed');
                        this.classList.remove('collapsed');
                    }
                });
                
                toggleSpan.addEventListener('mousedown', function(e) { e.stopPropagation(); });
                toggleSpan.addEventListener('touchstart', function(e) { e.stopPropagation(); });
            }
        }
    }
});
</script>
        
        <!-- QGIS2Web Optimizer: Tính năng bổ sung -->
        <script>
        document.addEventListener('DOMContentLoaded', function() {
            var isGrayActive = false;
            var checkMapTimer = setInterval(function() {
                if (typeof map !== 'undefined') {
                    clearInterval(checkMapTimer);
                    
                    // --- 1. Áp dụng logic filter màu cho layer ---
                    map.getLayers().forEach(function(layer) {
                        if (layer instanceof ol.layer.Tile && !layer.get('grayFilterAdded')) {
                            layer.on('prerender', function(event) { if (isGrayActive && event.context) event.context.filter = 'grayscale(100%)'; });
                            layer.on('postrender', function(event) { if (isGrayActive && event.context) event.context.filter = 'none'; });
                            layer.set('grayFilterAdded', true);
                        }
                    });
                    
                    // --- 2. Xử lý UI Checkbox mượt mà bằng MutationObserver ---
                    var layerSwitcher = document.querySelector('.layer-switcher');
                    if (!layerSwitcher) return;
                    
                    var observer = new MutationObserver(function() {
                        observer.disconnect(); // Tạm ngắt để tránh lặp vô tận
                        addGrayscaleCheckbox(); // Chèn checkbox ngay lập tức
                        var newSwitcher = document.querySelector('.layer-switcher');
                        if (newSwitcher) observer.observe(newSwitcher, { childList: true, subtree: true });
                    });
                    
                    function addGrayscaleCheckbox() {
                        var panel = document.querySelector('.layer-switcher .panel') || document.querySelector('.layer-switcher');
                        if (panel && !document.getElementById('dynGrayscale')) {
                            var toggleDiv = document.createElement('div');
                            toggleDiv.style.padding = '8px 5px';
                            toggleDiv.style.borderTop = '1px solid #ddd';
                            toggleDiv.style.marginTop = '10px';
                            toggleDiv.style.fontWeight = 'bold';
                            var isChecked = isGrayActive ? 'checked' : '';
                            toggleDiv.innerHTML = '<label style="cursor:pointer;"><input type="checkbox" id="dynGrayscale" ' + isChecked + '> Nền Đen - Trắng</label>';
                            panel.appendChild(toggleDiv);
                            
                            document.getElementById('dynGrayscale').addEventListener('change', function(e) {
                                isGrayActive = e.target.checked;
                                map.render(); // Yêu cầu map vẽ lại
                            });
                        }
                    }
                    
                    // Kích hoạt lần đầu
                    addGrayscaleCheckbox();
                    observer.observe(layerSwitcher, { childList: true, subtree: true });
                }
            }, 200); // Check 0.2s một lần cho đến khi biến 'map' xuất hiện
        });
        </script>

<div id="myqgis-info-panel" style="display: none;">
    <div id="myqgis-panel-header">
        <h3>Thông tin chi tiết</h3>
        <button id="myqgis-close-btn" onclick="document.getElementById('myqgis-info-panel').style.display='none';">×</button>
    </div>
    <div id="myqgis-panel-content"></div>
</div>
<script>
    function makeElementDraggable(elmnt, header) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        if (header) { header.onmousedown = dragMouseDown; }
        function dragMouseDown(e) {
            e = e || window.event;
            if (e.target.id === 'myqgis-close-btn') return;
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }
        function elementDrag(e) {
            e = e || window.event;
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            elmnt.style.top = (elmnt.offsetTop - pos2) + 'px';
            elmnt.style.left = (elmnt.offsetLeft - pos1) + 'px';
            elmnt.style.right = 'auto';
        }
        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
        }
    }
    setTimeout(function() {
        var panel = document.getElementById('myqgis-info-panel');
        var pHeader = document.getElementById('myqgis-panel-header');
        var pContent = document.getElementById('myqgis-panel-content');
        if (panel && pHeader) { makeElementDraggable(panel, pHeader); }
        var fieldsConfig = [
            { mainField: 'TenTuyen', fallbackFields: ['Name', 'layer', 'Layer'], label: 'Tên tuyến' },
            { mainField: 'DoDai', fallbackFields: [], label: 'Độ dài' },
            { mainField: 'SoGa', fallbackFields: [], label: 'Số lượng nhà ga' },
            { mainField: 'GhiChu', fallbackFields: [], label: 'Ghi chú' },
        ];
        if (typeof map !== 'undefined') {
            map.on('pointermove', function(e) {
                if (e.dragging) return;
                var hit = map.hasFeatureAtPixel(e.pixel);
                map.getTargetElement().style.cursor = hit ? 'pointer' : '';
            });
            map.on('singleclick', function(evt) {
                var featureFound = false;
                map.forEachFeatureAtPixel(evt.pixel, function(feature) {
                    featureFound = true;
                    var htmlString = '';
                    for (var i = 0; i < fieldsConfig.length; i++) {
                        var cfg = fieldsConfig[i];
                        var val = feature.get(cfg.mainField);
                        if ((val == null || val === '') && cfg.fallbackFields.length > 0) {
                            for (var j = 0; j < cfg.fallbackFields.length; j++) {
                                val = feature.get(cfg.fallbackFields[j]);
                                if (val != null && val !== '') break;
                            }
                        }
                        if (val == null || val === '') val = 'Chưa cập nhật';
                        htmlString += '<p style="white-space: normal; word-break: break-all;"><strong>' + cfg.label + ':</strong> ' + val + '</p>';
                    }
                    pContent.innerHTML = htmlString;
                    panel.style.display = 'block';
                    pContent.classList.remove('update-anim');
                    void pContent.offsetWidth;
                    pContent.classList.add('update-anim');
                    return true;
                });
            });
        } else {
            console.error('Lỗi: Đối tượng Bản đồ chưa sẵn sàng.');
        }
    }, 2000);
</script>
